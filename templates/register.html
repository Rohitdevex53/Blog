<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body style="font-family:Arial; display:flex; justify-content:center; align-items:center; height:100vh; background:#f4f4f4;">

<div style="background:white; padding:30px; border-radius:10px; width:300px;">
    <h2 style="text-align:center;">Register</h2>
<form method="POST" style="text-align:center;">
    {% csrf_token %}

    <div style="display:flex; align-items:center; margin-bottom:15px;">
        <h5 style="width:100px; margin:0;">Name :</h5>
        {{ form.name }}
    </div>

    <div style="display:flex; align-items:center; margin-bottom:15px;">
        <h5 style="width:100px; margin:0;">Email :</h5>
        {{ form.email }}
    </div>

    <div style="display:flex; align-items:center; margin-bottom:15px;">
        <h5 style="width:100px; margin:0;">Password :</h5>
        {{ form.password }}
    </div>

    <button type="submit"
        style="width:100%; padding:10px; margin-top:10px; background:#4facfe; color:white; border:none;">
        Register
    </button>
</form>

    <p style="text-align:center; margin-top:10px;">
        Already have an account? <a href="/login">Login</a>
    </p>
</div>

</body>
</html>
