<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
</head>

<body style="margin:0; font-family:Arial, sans-serif; background:#f4f4f4;">
    {% csrf_token %}
    <!-- Navbar -->
    <div style="background:#111; color:white; padding:15px 40px; display:flex; justify-content:space-between; align-items:center;">

        <h2 style="margin:0;">My Dashboard</h2>

        <div>
            <a href="#" style="color:white; text-decoration:none; margin-right:20px;">Home</a>
            <a href="#" style="color:white; text-decoration:none; margin-right:20px;">Profile</a>
            <form action="{% url 'logout' %}" method="POST">
                {% csrf_token %}
            <button type="submit">Log Out</button>
            </form>
        </div>

    </div>

    <!-- Main Container -->
    <div style="display:flex; justify-content:center; margin-top:50px;">

        <!-- Card -->
        <div style="background:white; width:400px; padding:30px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);">

            <h1 style="text-align:center; margin-bottom:30px;">
                Welcome, {{ request.user.username }}
            </h1>

            <div style="margin-bottom:20px;">
                <h3 style="margin:0;">Username</h3>
                <p style="color:gray;">{{ request.user.username }}</p>
            </div>

            <div style="margin-bottom:20px;">
                <h3 style="margin:0;">Email</h3>
                <p style="color:gray;">{{ request.user.email }}</p>
            </div>

            <div style="margin-bottom:20px;">
                <h3 style="margin:0;">User ID</h3>
                <p style="color:gray;">{{ request.user.id }}</p>
            </div>

            <div style="margin-bottom:20px;">
                <h3 style="margin:0;">Last Login</h3>
                <p style="color:gray;">{{ request.user.last_login }}</p>
            </div>

        </div>

    </div>

</body>
</html>
